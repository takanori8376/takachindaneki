// =====================================

const DAY_BASE = new Date('2000-01-07T00:00:00+09:00');

function getKanshi(date){
    const d = new Date(
        date.getFullYear(),
        date.getMonth(),
        date.getDate(),
        0, 0, 0
    );
    const base = new Date(
        DAY_BASE.getFullYear(),
        DAY_BASE.getMonth(),
        DAY_BASE.getDate(),
        0, 0, 0
    );
    const diff = Math.round((d - base) / 86400000);
    return stems[((diff % 10) + 10) % 10]
         + branches[((diff % 12) + 12) % 12];
}

};

const monthBranchNames = ['寅','卯','辰','巳','午','未','申','酉','戌','亥','子','丑'];

function getMonthKanshi(date){
    const year  = date.getFullYear();
    const mmdd  = (date.getMonth()+1)*100 + date.getDate();

    // 節気テーブルから月支インデックスを決定
    // 1月は前年の小寒(index11)が基準
    const terms = solarTerms[year];
    const prevTerms = solarTerms[year - 1];
    let monthIdx = 0;

    if(terms){
        for(let i = 0; i < 11; i++){
            const [mm, dd] = terms[i].split('-').map(Number);
            if(mmdd >= mm * 100 + dd) monthIdx = i;
        }
        // 1月で前年の小寒以降かチェック
        if(date.getMonth() === 0 && prevTerms){
            const [mm, dd] = prevTerms[11].split('-').map(Number);
            if(mmdd >= mm * 100 + dd) monthIdx = 11;
        }
    } else {
        // テーブルがない年は概算（month基準）
        monthIdx = date.getMonth();
    }

    // 月干：五虎遁年法
    // 節気が年をまたぐ場合（丑月=1月）は前年の年干を使う
    const refYear = (monthIdx === 11 && date.getMonth() === 0)
        ? year - 1
        : year;
    const yearStemIdx = ((refYear - 1984) % 10 + 10) % 10;
    const startStemTable = [2, 4, 6, 8, 0, 2, 4, 6, 8, 0];
    const monthStemIdx = (startStemTable[yearStemIdx] + monthIdx) % 10;

    return stems[monthStemIdx] + monthBranchNames[monthIdx];
}

// =====================================
// 年干支
// 1984年=甲子を基準
// =====================================

function getYearKanshi(year){
    const idx = ((year - 1984) % 60 + 60) % 60;
    return stems[idx % 10] + branches[idx % 12];
}

// =====================================
// 空亡
// BUG FIX: 空亡は日干支の十干indexから求める
// 旧コードは日支を引数にしたテーブルを使っていたが、
// 空亡は「日干の甲子算出時のindex」＝日干支番号 % 12 で
// 余った支（戌亥・申酉…）が空亡になる
// =====================================

function getVoid(dayStemIndex, dayBranchIndex){

    // 日干支の通し番号（甲子=0, 乙丑=1, ... 癸亥=59）から
    // 六十干支の組番を求め、空亡を特定する
    // 組番 = floor(通し番号 / 10)  ← 各組は干10個
    // 空亡は各組の11・12番目（index 10,11）の支
    // 組0(甲子〜癸酉)→戌亥, 組1(甲戌〜癸未)→申酉,
    // 組2(甲申〜癸巳)→午未, 組3(甲午〜癸卯)→辰巳,
    // 組4(甲辰〜癸丑)→寅卯, 組5(甲寅〜癸亥)→子丑

    const voidPairs = [
        '戌亥', // 甲子旬
        '申酉', // 甲戌旬
        '午未', // 甲申旬
        '辰巳', // 甲午旬
        '寅卯', // 甲辰旬
        '子丑'  // 甲寅旬
    ];

    // 甲子を基準に六十干支の通し番号を求める
    // 甲=0, 子=0 が基準
    // 通し番号 = stem*6 + ... は複雑なので、
    // stem % 10 と branch % 12 から最小公倍数60で算出
    // 簡便法: 通し番号 n は stem == n%10 かつ branch == n%12 を満たす最小の n
    let n = 0;
    for(let k = 0; k < 60; k++){
        if(k % 10 === dayStemIndex && k % 12 === dayBranchIndex){
            n = k;
            break;
        }
    }

    const groupIndex = Math.floor(n / 10);
    return voidPairs[groupIndex];
}

const sixChong = {
    '子':'午','午':'子',
    '丑':'未','未':'丑',
    '寅':'申','申':'寅',
    '卯':'酉','酉':'卯',
    '辰':'戌','戌':'辰',
    '巳':'亥','亥':'巳'
};

const sixHe = {
    '子':'丑','丑':'子',
    '寅':'亥','亥':'寅',
    '卯':'戌','戌':'卯',
    '辰':'酉','酉':'辰',
    '巳':'申','申':'巳',
    '午':'未','未':'午'

// =====================================
// 六合卦・六冲卦・帰魂卦・遊魂卦の判定
// =====================================

// 六合卦：全爻が六合の関係（1-4, 2-5, 3-6爻が合）
function isRokugoHex(lines){
    const pairs = [[0,3],[1,4],[2,5]];
    return pairs.every(([a,b]) => {
        const ba = getBranchFromLine(lines[a]);
        const bb = getBranchFromLine(lines[b]);
        return sixHe[ba] === bb;
    });
}

// 六冲卦：全爻が六冲の関係（1-4, 2-5, 3-6爻が冲）
function isRokuchyuHex(lines){
    const pairs = [[0,3],[1,4],[2,5]];
    return pairs.every(([a,b]) => {
        const ba = getBranchFromLine(lines[a]);
        const bb = getBranchFromLine(lines[b]);
        return sixChong[ba] === bb;
    });
}

// 支を文字列から抽出（getBranchの別名、判定用）
function getBranchFromLine(lineText){
    for(const b of branches){
        if(lineText && lineText.includes(b)) return b;
    }
    return '';
}

// 帰魂卦・遊魂卦はpalaceMapのshiから判定
// 帰魂卦: shi===3（四爻）で宮内8番目
// 遊魂卦: shi===3（四爻）で宮内7番目
// → palaceMapに種別を追加するか、卦名リストで判定
const kikonHexSet = new Set([
    '火天大有','天火同人','澤雷随','雷澤帰妹',
    '風山蠱','山風蠱','地水師','水地比'
]);
const yukonHexSet = new Set([
    '火地晋','天水訟','澤風大過','雷山小過',
    '風澤中孚','山雷頤','地火明夷','水天需'
]);

function getHexType(hexName, lines){
    if(kikonHexSet.has(hexName)) return '帰魂卦';
    if(yukonHexSet.has(hexName)) return '遊魂卦';
    if(isRokugoHex(lines))  return '六合卦';
    if(isRokuchyuHex(lines)) return '六冲卦';
    return '';
}

// 支を文字列から抽出（例：'妻財子水' → '子'）
function getBranch(lineText){
    // 六親名（子孫・妻財・官鬼・兄弟・父母）を除いた部分から支を探す
    const stripped = lineText
        .replace('子孫','').replace('妻財','').replace('官鬼','')
        .replace('兄弟','').replace('父母','');
    for(const b of branches){
        if(stripped.includes(b)) return b;
    }
    return '';
}

// =====================================
// 進神・退神判定
// 動爻が変じて同五行でより強い支→進神、弱い支→退神
// =====================================

const branchOrder = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];

function getShinTai(mainLine, changedLine){
    if(!changedLine || !mainLine) return '';
    const origBranch    = getBranch(mainLine);
    const changedBranch = getBranch(changedLine);
    if(!origBranch || !changedBranch) return '';

    const origElem    = getBranchElement(origBranch);
    const changedElem = getBranchElement(changedBranch);

    // 同五行でなければ進神・退神なし（回頭生・回頭剋を表示）
    if(origElem !== changedElem){
        if(generate[changedElem] === origElem) return '回頭生';
        if(control[changedElem] === origElem)  return '回頭剋';
        return '';
    }

    // 同五行：支の順番で進神・退神を判定
    const origIdx    = branchOrder.indexOf(origBranch);
    const changedIdx = branchOrder.indexOf(changedBranch);
    if(changedIdx > origIdx) return '進神';
    if(changedIdx < origIdx) return '退神';
    return '';
}

// =====================================
// 用神再現：複数の用神候補から真の用神を選ぶ
// 優先順位：動爻 > 世応 > 月破日破 > 空亡 > 相冲相合
// =====================================

function selectYoushin(
    candidates,  // [{index, line}, ...]
    coinInputs,
    shi, ou,
    monthBranch, dayBranch,
    voidStr
){
    if(candidates.length === 0) return -1;
    if(candidates.length === 1) return candidates[0].index;

    function score(c){
        const branch = getBranch(c.line);
        const coinVal = Number(coinInputs[c.index].value);
        let s = 0;

        // 1. 動爻（最優先）
        if(isMoving(coinVal)) s += 100000;

        // 2. 世爻・応爻
        if(c.index === shi || c.index === ou) s += 10000;

        // 3. 月破・日破（月建/日辰と六冲）
        if(sixChong[monthBranch] === branch ||
           sixChong[dayBranch]   === branch) s += 1000;

        // 4. 空亡
        if(voidStr.includes(branch)) s += 100;

        // 5. 相冲・相合（月建/日辰と冲または合）
        if(sixChong[monthBranch] === branch ||
           sixHe[monthBranch]    === branch ||
           sixChong[dayBranch]   === branch ||
           sixHe[dayBranch]      === branch) s += 10;

        return s;
    }

    // スコアが最大の候補を選ぶ
    let best = candidates[0];
    let bestScore = score(candidates[0]);
    for(let i = 1; i < candidates.length; i++){
        const s = score(candidates[i]);
        if(s > bestScore){
            bestScore = s;
            best = candidates[i];
        }
    }
    return best.index;
}

function isYang(v){

}

function buildChangedBits(main){

function buildHexName(lines){

    const lower =
        lines
        .slice(0,3)
        .reverse()
        .join('');

    const upper =
        lines
        .slice(3,6)
        .reverse()
        .join('');

    const lowerName =
        trigramMap[lower];

    const upperName =
        trigramMap[upper];

    const key =
        upperName + lowerName;

    return hexagramNames[key]
        || key;
}

// =====================================
// 八卦抽出
// =====================================

function getTrigrams(lines){

    const lower =
        lines
        .slice(0,3)
        .reverse()
        .join('');

    const upper =
        lines
        .slice(3,6)
        .reverse()
        .join('');

    return {

        lower:
            trigramMap[lower],

        upper:
            trigramMap[upper]
    };
}

// =====================================
// 五行抽出
// =====================================

function getFiveElement(text){

    if(text.includes('木')) return '木';
    if(text.includes('火')) return '火';
    if(text.includes('土')) return '土';
    if(text.includes('金')) return '金';
    if(text.includes('水')) return '水';

    return '';
}

// =====================================
// 六親判定
// =====================================

function calcRokushin(
    baseElement,
    targetElement
){

    if(targetElement===baseElement)
        return '兄弟';

    if(generate[baseElement]
        === targetElement)
        return '子孫';

    if(control[baseElement]
        === targetElement)
        return '妻財';

    if(control[targetElement]
        === baseElement)
        return '官鬼';

    if(generate[targetElement]
        === baseElement)
        return '父母';

    return '';
}

// =====================================
// 納甲＋六親
// BUG FIX: 各卦の爻データを初爻から順番に並べる
// 旧コードは lower[0]〜lower[2] を初爻〜三爻としていたが
// trigramNaikoが逆順だったため正しく修正済み（trigramNaiko側を修正）
// =====================================

function buildNaiko(
    lines,
    hexName
){

    const tri =
        getTrigrams(lines);

    const lower =
        trigramNaiko[tri.lower].inner;

    const upper =
        trigramNaiko[tri.upper].outer;

    // 宮の基準五行を取得
    const palace =
        palaceMap[hexName]
        ? palaceMap[hexName].palace
        : '';

    const baseElement =
        palaceElement[palace] || '木';

    // 初爻〜三爻：下卦inner、四爻〜上爻：上卦outer
    const raw = [
        lower[0], lower[1], lower[2],
        upper[0], upper[1], upper[2]
    ];

    return raw.map(v=>{

        const element =
            getFiveElement(v);

        const rokushin =
            calcRokushin(
                baseElement,
                element
            );

        return rokushin + v;
    });
}

function getShi(hex){

    if(palaceMap[hex])
        return palaceMap[hex].shi;

    return 0;
}

function getOu(shi){

    return (shi + 3) % 6;
}

// =====================================

function generatedBy(element){

    for(const k in generate){

        if(generate[k]===element)
            return k;
    }

    return '';
}

// =====================================

function controlledBy(element){

    for(const k in control){

        if(control[k]===element)
            return k;
    }

    return '';
}

// =====================================

// =====================================

function getKyushin(y){

    const kishin =
        controlledBy(y);

    return generatedBy(kishin);
}

// =====================================
// 用神系判定
// =====================================

function calcShin(
    text,
    y
){

    const t =
        getFiveElement(text);

    if(t===y)
        return '用神';

    if(generate[t]===y)
        return '原神';

    if(control[t]===y)
        return '忌神';

    if(t===getKyushin(y))
        return '仇神';

    return '';
}

// =====================================
// コイン記号
// BUG FIX: 六爻占術の標準的な記号に修正
// 旧コード: 0→✕ 1→′ 2→″ 3→〇
// 正しくは: 1→少陽(—) 2→少陰(--) 3→老陽(〇) 0→老陰(×)
// =====================================

function coinMark(v){

    if(v===1) return '‵';   // 少陽：不動の陽爻
    if(v===2) return '‶';   // 少陰：不動の陰爻
    if(v===3) return '〇';  // 老陽：動爻（陽→陰に変化）
    if(v===0) return '✕';   // 老陰：動爻（陰→陽に変化）

    return '';
}

// =====================================
// 伏神
// 用神の五行が主卦中にない場合、同宮の純卦の各爻から探す
// 純卦の爻のうち用神五行と一致するものが伏神
// =====================================

// 各宮の純卦名
const palacePureHex = {
    '乾宮':'乾為天',
    '兌宮':'兌為澤',
    '離宮':'離為火',
    '震宮':'震為雷',
    '巽宮':'巽為風',
    '坎宮':'坎為水',
    '艮宮':'艮為山',
    '坤宮':'坤為地'
};

// 純卦のbits（初爻〜上爻、1=陽 0=陰）
const pureHexBits = {
    '乾為天':[1,1,1,1,1,1],
    '兌為澤':[1,1,0,1,1,0],
    '離為火':[1,0,1,1,0,1],
    '震為雷':[1,0,0,1,0,0],
    '巽為風':[0,1,1,0,1,1],
    '坎為水':[0,1,0,0,1,0],
    '艮為山':[0,0,1,0,0,1],
    '坤為地':[0,0,0,0,0,0]
};

function buildFukushin(
    mainLines,
    yElement,
    mainHex
){
    const result = ['','','','','',''];
    const roles  = ['','','','','',''];

    // 同宮の純卦を取得
    const palace =
        palaceMap[mainHex]
        ? palaceMap[mainHex].palace
        : '';

    const pureHexName = palacePureHex[palace] || '';
    if(!pureHexName) return { lines: result, roles, pureHexName: '' };

    const pureBits = pureHexBits[pureHexName];
    const pureLines = buildNaiko(pureBits, pureHexName);

    // 主卦中に存在する五行セット
    const mainElements = new Set(
        mainLines.map(v => getFiveElement(v))
    );

    // 表示対象の役割と五行（用神・原神・忌神・仇神）
    const targetRoles = [
        { role: '用神', elem: yElement },
        { role: '原神', elem: generatedBy(yElement) },
        { role: '忌神', elem: controlledBy(yElement) },
        { role: '仇神', elem: getKyushin(yElement) }
    ];

    // 主卦中にない五行のみ伏神候補
    const hiddenTargets = targetRoles.filter(
        t => t.elem && !mainElements.has(t.elem)
    );

    if(hiddenTargets.length === 0)
        return { lines: result, roles, pureHexName: '' };

    // 純卦の各爻を調べて伏神を割り当て
    // 優先順位：用神 > 原神 > 忌神 > 仇神
    for(let i = 0; i < 6; i++){

        const mainElem = getFiveElement(mainLines[i]);
        const pureElem = getFiveElement(pureLines[i]);

        // 主卦と純卦で支が違う爻にのみ伏神が潜む
        if(mainElem === pureElem) continue;

        const matched = hiddenTargets.find(
            t => t.elem === pureElem
        );

        if(matched){
            result[i] = pureLines[i];
            roles[i]  = matched.role;
        }
    }

    // 1つも伏神がなければ純卦名も不要
    const hasFuku = result.some(v => v !== '');
    return {
        lines: result,
        roles,
        pureHexName: hasFuku ? pureHexName : ''
    };
}

// =====================================
// 六獣配置
// BUG FIX: 六獣は日干により開始位置が変わる
// 旧コードは beasts[i] で固定割り当て（常に青龍が初爻）だった
// 正しくは日干ごとに初爻の六獣が決まる（六獣遁法）:
// 甲戊庚→青龍から、乙己→朱雀から、丙丁→勾陳から、
// 壬癸→玄武から、辛→白虎から
// =====================================

function getBeastsForDay(dayStemIndex){

    // 六獣開始index（初爻に付く六獣）
    // 甲(0)戊(4)庚(6)→青龍(0)
    // 乙(1)己(5)→朱雀(1)
    // 丙(2)丁(3)→勾陳(2)
    // 辛(7)→白虎(4)
    // 壬(8)癸(9)→玄武(5)
    const startTable = [
        0, // 甲→青龍
        0, // 乙→青龍
        1, // 丙→朱雀
        1, // 丁→朱雀
        2, // 戊→勾陳
        3, // 己→騰蛇
        4, // 庚→白虎
        4, // 辛→白虎
        5, // 壬→玄武
        5  // 癸→玄武
    ];

    const start = startTable[dayStemIndex];
    const result = [];

    for(let i=0;i<6;i++){
        result.push(
            beasts[(start + i) % 6]
        );
    }

    return result;
}

function buildHexagram(){

        pad(dt.getMinutes());

    const day =
        getKanshi(dt);

    const dayStemIndex =
        stems.indexOf(
            day.charAt(0)
        );

    const dayBranch =
        day.charAt(1);

    const dayBranchIndex =
        branches.indexOf(dayBranch);

    const month =
        getMonthKanshi(dt);

    // 支の五行
    const branchElement = {
        '子':'水','丑':'土','寅':'木','卯':'木',
        '辰':'土','巳':'火','午':'火','未':'土',
        '申':'金','酉':'金','戌':'土','亥':'水'
    };

    const monthBranch = month.charAt(1);
    const monthElem = branchElement[monthBranch] || '';
    const dayElem   = branchElement[dayBranch]   || '';
    const voidStr   = getVoid(dayStemIndex, dayBranchIndex);

    document
    .getElementById('dateInfo')
    .innerHTML =
        `占い日：　${month}(${monthElem})月　　${day}(${dayElem})日　　　空亡－${voidStr}`;

    // 卦生成

    const mainBits =
        buildMainBits();

    const changedBits =
        buildChangedBits(
            mainBits
        );

    const mainHex =
        buildHexName(
            mainBits
        );

    const changedHex =
        buildHexName(
            changedBits
        );

    // 世応

    const shi =
        getShi(mainHex);

    const ou =
        getOu(shi);

    // 六親生成（宮の基準五行を使うのでhexNameを渡す）

    const mainLines =
        buildNaiko(
            mainBits,
            mainHex
        );

    const changedLines =
        buildNaiko(
            changedBits,
            mainHex  // 変卦も主卦の宮基準で六親を算出
        );

    // 用神（宮の基準五行）

    const palace =
        palaceMap[mainHex]
        ? palaceMap[mainHex].palace
        : '';

    const baseElement =
        palaceElement[palace] || '木';

    const select =
        document
        .getElementById(
            'youshin'
        ).value;

    // 宮の基準五行から六親→五行マップを生成
    const roleMap =
        getRoleElementMap(baseElement);

    let yElement = '';

    if(select==='世爻'){
        // 世爻の五行はmainLines[shi]から直接取得する
        yElement = getFiveElement(mainLines[shi]);
    }
    else{
        yElement = roleMap[select] || '';
    }

    // =========================================
    // 用神再現：主卦中に用神五行が2つ以上ある場合
    // selectYoushin()で真の用神爻を決定する
    // 世爻を用神に選んだ場合は再現をスキップし世爻を直接用神とする
    // =========================================

    const coinInputsArr =
        Array.from(document.querySelectorAll('.coin'));

    const youshinCandidates = [];
    for(let i = 0; i < 6; i++){
        if(getFiveElement(mainLines[i]) === yElement){
            youshinCandidates.push({ index: i, line: mainLines[i] });
        }
    }

    let youshinIndex;

    if(select === '世爻'){
        youshinIndex = shi;
    } else {
        youshinIndex = selectYoushin(
            youshinCandidates,
            coinInputsArr,
            shi, ou,
            monthBranch, dayBranch,
            voidStr
        );
    }

    // 伏神

    const fukushin =
        buildFukushin(
            mainLines,
            yElement,
            mainHex
        );

    const fukushinLines    = fukushin.lines;
    const fukushinRoles    = fukushin.roles;
    const fukushinHexName  = fukushin.pureHexName;

    // 六獣（日干に基づいて配置）

    const dayBeasts =
        getBeastsForDay(
            dayStemIndex
        );

    // 描画

    let html =
        '<table class="result-table">';

    const coinInputs =
        document
        .querySelectorAll('.coin');

    for(let i=5;i>=0;i--){

        const role =
            (getFiveElement(mainLines[i]) === yElement &&
             youshinCandidates.length >= 2 &&
             i !== youshinIndex)
            ? ''
            : calcShin(mainLines[i], yElement);

        const se =

            i===shi
            ? '世'
            : (
                i===ou
                ? '応'
                : ''
            );

        // 伏神の純卦名：この爻に伏神があれば表示
        const fukuHexDisplay =
            fukushinLines[i]
            ? `<ruby>${fukushinHexName}<rt>${hexagramReading[fukushinHexName]||''}</rt></ruby>`
            : '';

        // 飛神（変卦）の卦名：この爻が変爻なら表示
        const coinVal = Number(coinInputs[i].value);
        const isMove  = isMoving(coinVal);
        const changedLineDisplay = isMove ? changedLines[i] : '';

        html += `

        <tr>

        <td class="role-col">

            ${fukushinRoles[i]}

        </td>

        <td class="fuku-col">

            ${fukushinLines[i]}

        </td>

        <td class="main-role-col">

            ${role}

        </td>

        <td class="main-col">

            ${mainLines[i]}

        </td>

        <td class="coin-col">

            ${coinMark(coinVal)}

        </td>

        <td class="se-col">

            ${se}

        </td>

        <td class="shintai-col">

            ${isMove ? getShinTai(mainLines[i], changedLines[i]) : ''}

        </td>

        <td class="change-col">

            ${changedLineDisplay}

        </td>

        <td class="beast-col">

            ${dayBeasts[i]}

        </td>

        </tr>
        `;
    }

    const hasMovingLine = Array.from(coinInputs).some(c => isMoving(Number(c.value)));

    // 六合・六冲・帰魂・遊魂の判定
    const mainHexType    = getHexType(mainHex, mainLines);
    const changedHexType = hasMovingLine ? getHexType(changedHex, changedLines) : '';
    const fukuHexType    = fukushinHexName ? getHexType(fukushinHexName,
        Array.from({length:6}, (_,i) => fukushinLines[i] || mainLines[i])) : '';

    html += `

    <tr class="hex-row">

    <td class="role-col">${palace}</td>

    <td class="fuku-col">
    ${fukushinHexName
        ? `<ruby>${fukushinHexName}<rt>${hexagramReading[fukushinHexName]||''}</rt></ruby>
           ${fukuHexType ? `<div class="hex-type">${fukuHexType}</div>` : ''}`
        : ''}
    </td>

    <td class="main-role-col"></td>

    <td class="hex-center">
    <ruby>${mainHex}<rt>${hexagramReading[mainHex]||''}</rt></ruby>
    ${mainHexType ? `<div class="hex-type">${mainHexType}</div>` : ''}
    </td>

    <td class="coin-col"></td>
    <td class="se-col"></td>
    <td class="shintai-col"></td>

    <td class="change-col">
    ${hasMovingLine
        ? `<ruby>${changedHex}<rt>${hexagramReading[changedHex]||''}</rt></ruby>
           ${changedHexType ? `<div class="hex-type">${changedHexType}</div>` : ''}`
        : ''}
    </td>

    <td class="beast-col"></td>

    </tr>
    `;

    html += '</table>';

    // ポイント計算







    const point = calcPoint(
        mainLines,
        changedLines,
        coinInputsArr,
        youshinIndex,
        yElement,
        shi,
        monthBranch,
        dayBranch,
        voidStr,
        fukushinLines,
        select
    );

    const pointSign  = point > 0 ? '＋' : '';
    const pointColor = point > 0 ? '#ffd700' : point < 0 ? '#ff6b6b' : '#ffffff';

    html += `
    <div class="point-box">
        <div class="point-label">運の強さ</div>
        <div class="point-value" style="color:${pointColor}">${pointSign}${point}</div>
    </div>
    `;

    document
    .getElementById(
        'result'
    ).innerHTML = html;
}

// =====================================
// ポイント計算
// ポイント = 用神スコア + 原神スコア - 忌神スコア
// 原神・忌神は独発の場合のみ有効
// =====================================

// 支→五行マップ
const branchElementMap = {
    '子':'水','丑':'土','寅':'木','卯':'木',
    '辰':'土','巳':'火','午':'火','未':'土',
    '申':'金','酉':'金','戌':'土','亥':'水'
};

function getBranchElement(branch){
    return branchElementMap[branch] || null;
}

// 参照支（月建・日辰）と対象五行の関係スコアを返す
function calcElementRelation(targetElem, refBranch){
    const refElem = getBranchElement(refBranch);
    if(!refElem || !targetElem) return 0;
    if(refElem === targetElem)             return 3;  // 同行
    if(generate[refElem] === targetElem)   return 2;  // 生じる
    if(control[refElem] === targetElem)    return -2; // 剋される
    return 0; // 洩らす・剋す
}

function calcPoint(
    mainLines,
    changedLines,
    coinInputsArr,
    youshinIndex,
    yElement,
    shi,
    monthBranch,
    dayBranch,
    voidStr,
    fukushinLines,
    select
){
    function isMovingIdx(i){ return isMoving(Number(coinInputsArr[i].value)); }

    // 動爻インデックス一覧
    const movingIndices = [];
    for(let i = 0; i < 6; i++){
        if(isMovingIdx(i)) movingIndices.push(i);
    }
    const isDokuhatsu = movingIndices.length === 1;

    // 回頭生・回頭剋スコア
    function getKaitouScore(idx, targetElem){
        if(!isMovingIdx(idx)) return 0;
        const changedBranch = getBranch(changedLines[idx]);
        if(!changedBranch) return 0;
        const changedElem = getBranchElement(changedBranch);
        if(generate[changedElem] === targetElem) return 1;  // 回頭生
        if(control[changedElem] === targetElem)  return -1; // 回頭剋
        return 0;
    }

    // 進神・退神スコア
    function getShinTaiScore(idx){
        if(!isMovingIdx(idx)) return 0;
        const result = getShinTai(mainLines[idx], changedLines[idx]);
        if(result === '進神') return 1;
        if(result === '退神') return -1;
        return 0;
    }

    // 用神スコア
    function calcYoushinScore(){
        let score = 0;
        const yBranch = getBranch(mainLines[youshinIndex]);
        const yElem   = getBranchElement(yBranch);

        const mScore = calcElementRelation(yElem, monthBranch);
        const dScore = calcElementRelation(yElem, dayBranch);
        const kScore = getKaitouScore(youshinIndex, yElem);


        score += mScore;
        score += dScore;
        if(youshinIndex === shi && select !== '世爻') score += 1;
        if(isMovingIdx(youshinIndex))       score += 1;
        if(voidStr.includes(yBranch))       score -= 1;
        if(sixChong[dayBranch] === yBranch) score -= 1;
        score += kScore;

        return score;
    }

    // 原神・忌神スコア
    // 動爻がある場合：動爻の中に原神・忌神があれば有効
    // 動爻が一切ない場合：月建・日辰スコアが1以上の爻のみ有効
    function calcShinScore(targetElem){
        if(!targetElem) return 0;

        const hasMoving = movingIndices.length > 0;

        if(hasMoving){
            // 動爻の中にtargetElemがあるか
            const matchIdx = movingIndices.find(i => {
                const elem = getBranchElement(getBranch(mainLines[i]));
                return elem === targetElem;
            });
            if(matchIdx === undefined) return 0;

            // 卦中にない場合は伏神確認
            const inMain = mainLines.some(l => getBranchElement(getBranch(l)) === targetElem);
            if(!inMain){
                const fukuElem = getBranchElement(getBranch(fukushinLines[matchIdx] || ''));
                if(fukuElem !== targetElem) return 0;
            }

            let score = 0;
            score += calcElementRelation(targetElem, monthBranch);
            score += calcElementRelation(targetElem, dayBranch);
            score += getKaitouScore(matchIdx, targetElem);
            score += getShinTaiScore(matchIdx);           // 進神・退神

            // 独発の場合は回頭剋も有効（既にgetKaitouScoreで計算済み）
            return score;

        } else {
            // 動爻なし：月建・日辰スコアが1以上の爻のみ有効
            // 卦中にtargetElemがある爻を探す
            let bestScore = 0;
            let found = false;
            for(let i = 0; i < 6; i++){
                const elem = getBranchElement(getBranch(mainLines[i]));
                if(elem !== targetElem) continue;
                const s = calcElementRelation(targetElem, monthBranch)
                        + calcElementRelation(targetElem, dayBranch);
                if(s >= 1){
                    found = true;
                    bestScore = s;
                    break;
                }
            }
            // 卦中にない場合は伏神確認
            if(!found){
                for(let i = 0; i < 6; i++){
                    const fukuElem = getBranchElement(getBranch(fukushinLines[i] || ''));
                    if(fukuElem !== targetElem) continue;
                    const s = calcElementRelation(targetElem, monthBranch)
                            + calcElementRelation(targetElem, dayBranch);
                    if(s >= 1){
                        found = true;
                        bestScore = s;
                        break;
                    }
                }
            }
            return found ? bestScore : 0;
        }
    }

    // 原神の五行（用神を生じる五行）
    const genElem = generatedBy(yElement);

    // 忌神の五行（用神を剋す五行）= control[X] === yElement のX
    const ikiElem = Object.keys(control).find(k => control[k] === yElement) || null;

    const yScore   = calcYoushinScore();
    const genScore = calcShinScore(genElem);
    const ikiScore = calcShinScore(ikiElem);

    return yScore + genScore - ikiScore;
}

buildHexagram();
