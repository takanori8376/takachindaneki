function getMoonVoidState(now) {
    const bufMs = VOID_BUFFER_HOURS * 3600000;
    for(const v of VOID_DATA_2026) {
        const start = new Date(v.s);
        const end   = new Date(v.e);
        const warnStart = new Date(start.getTime() - bufMs);
        const warnEnd   = new Date(end.getTime()   + bufMs);
        if(now < warnStart) continue;
        if(now > warnEnd)   continue;
        if(now >= start && now <= end)    return { state:'active', voidStart:start, voidEnd:end, sign:v.n };
        if(now >= warnStart && now < start) return { state:'before', voidStart:start, voidEnd:end, sign:v.n };
        if(now > end && now <= warnEnd)   return { state:'after',  voidStart:start, voidEnd:end, sign:v.n };
    }
    // 次のボイドを探す
    for(const v of VOID_DATA_2026) {
        const start = new Date(v.s);
        if(start > now) return { state:'ok', voidStart:start, voidEnd:new Date(v.e), sign:v.n };
    }
    return { state:'ok' };
}

function updateVoidBanner() {
    const banner   = document.getElementById('moonvoid-banner');
    const statusEl = document.getElementById('moonvoid-status');
    const now      = new Date();
    const info     = getMoonVoidState(now);

    const pad = n => String(n).padStart(2,'0');
    const fmt = d => `${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;

    if(info.state === 'ok') {
        banner.style.display = 'none';
        statusEl.textContent = info.voidStart
            ? `🌙 次のボイド：${fmt(info.voidStart)}〜${fmt(info.voidEnd)}（${info.sign}座）`
            : '🌙 ムーンボイードなし';
        return;
    }

    banner.style.display = 'block';
    if(info.state === 'active') {
        banner.className = 'void-active';
        banner.innerHTML = `🌑 ただいまムーンボイド中です（${info.sign}座）<br>開始：${fmt(info.voidStart)}　終了：${fmt(info.voidEnd)}<br>占いは終了後${VOID_BUFFER_HOURS}時間後からお勧めします。`;
        statusEl.textContent = `🌑 ボイド中（${info.sign}座）`;
    } else if(info.state === 'before') {
        banner.className = 'void-warn';
        const minLeft = Math.round((info.voidStart - now) / 60000);
        banner.innerHTML = `⚠️ あと${minLeft}分でムーンボイドが始まります（${info.sign}座）<br>開始：${fmt(info.voidStart)}　終了：${fmt(info.voidEnd)}<br>占いはボイド終了後${VOID_BUFFER_HOURS}時間後にお勧めします。`;
        statusEl.textContent = `⚠️ ボイド間近（${info.sign}座）`;
    } else {
        banner.className = 'void-warn';
        const minPast   = Math.round((now - info.voidEnd) / 60000);
        const remaining = VOID_BUFFER_HOURS * 60 - minPast;
        banner.innerHTML = `⚠️ ムーンボイド（${info.sign}座）終了からまだ${minPast}分です。<br>落ち着くまであと${remaining}分お待ちいただくとより良いでしょう。`;
        statusEl.textContent = `⚠️ ボイド終了直後（${info.sign}座）`;
    }
}

// =====================================
// 日干支
// 基準日: 2000-01-07 = 甲子（検証済み）
// =====================================

const DAY_BASE = new Date('2000-01-07T00:00:00+09:00');

function getKanshi(date){
    const d = new Date(
        date.getFullYear(),
        date.getMonth(),
        date.getDate(),
        0, 0, 0
    );
    const base = new Date(
        DAY_BASE.getFullYear(),
        DAY_BASE.getMonth(),
        DAY_BASE.getDate(),
        0, 0, 0
    );
    const diff = Math.round((d - base) / 86400000);
    return stems[((diff % 10) + 10) % 10]
         + branches[((diff % 12) + 12) % 12];
}

// =====================================
// 月建（節気テーブルベース）
// 月支は節気（立春・驚蟄…）で切り替わる
// 月干は五虎遁年法で年干から決定
// =====================================

// 各年の12節気 [立春,驚蟄,清明,立夏,芒種,小暑,立秋,白露,寒露,立冬,大雪,小寒]
// 対応月支:    [寅  ,卯  ,辰  ,巳  ,午  ,未  ,申  ,酉  ,戌  ,亥  ,子  ,丑  ]
const solarTerms = {
    2020:['02-04','03-05','04-04','05-05','06-05','07-07','08-07','09-07','10-08','11-07','12-07','01-06'],
    2021:['02-03','03-05','04-04','05-05','06-05','07-07','08-07','09-07','10-08','11-07','12-07','01-05'],
    2022:['02-04','03-06','04-05','05-05','06-06','07-07','08-07','09-08','10-08','11-07','12-07','01-06'],
    2023:['02-04','03-06','04-05','05-06','06-06','07-07','08-08','09-08','10-08','11-08','12-07','01-06'],
    2024:['02-04','03-05','04-04','05-05','06-05','07-06','08-07','09-07','10-08','11-07','12-07','01-06'],
    2025:['02-03','03-05','04-04','05-05','06-05','07-07','08-07','09-07','10-08','11-07','12-07','01-05'],
    2026:['02-04','03-06','04-05','05-05','06-06','07-07','08-07','09-08','10-08','11-07','12-07','01-06'],
    2027:['02-04','03-06','04-05','05-06','06-06','07-07','08-08','09-08','10-08','11-07','12-07','01-06'],
    2028:['02-04','03-05','04-04','05-05','06-05','07-06','08-07','09-07','10-07','11-07','12-06','01-06'],
    2029:['02-03','03-05','04-04','05-05','06-05','07-07','08-07','09-07','10-08','11-07','12-07','01-05'],
    2030:['02-04','03-06','04-05','05-05','06-06','07-07','08-07','09-08','10-08','11-07','12-07','01-06'],
};

const monthBranchNames = ['寅','卯','辰','巳','午','未','申','酉','戌','亥','子','丑'];

function getMonthKanshi(date){
    const year  = date.getFullYear();
    const mmdd  = (date.getMonth()+1)*100 + date.getDate();

    // 節気テーブルから月支インデックスを決定
    // 1月は前年の小寒(index11)が基準
    const terms = solarTerms[year];
    const prevTerms = solarTerms[year - 1];
    let monthIdx = 0;

    if(terms){
        for(let i = 0; i < 11; i++){
            const [mm, dd] = terms[i].split('-').map(Number);
            if(mmdd >= mm * 100 + dd) monthIdx = i;
        }
        // 1月で前年の小寒以降かチェック
        if(date.getMonth() === 0 && prevTerms){
            const [mm, dd] = prevTerms[11].split('-').map(Number);
            if(mmdd >= mm * 100 + dd) monthIdx = 11;
        }
    } else {
        // テーブルがない年は概算（month基準）
        monthIdx = date.getMonth();
    }

    // 月干：五虎遁年法
    // 節気が年をまたぐ場合（丑月=1月）は前年の年干を使う
    const refYear = (monthIdx === 11 && date.getMonth() === 0)
        ? year - 1
        : year;
    const yearStemIdx = ((refYear - 1984) % 10 + 10) % 10;
    const startStemTable = [2, 4, 6, 8, 0, 2, 4, 6, 8, 0];
    const monthStemIdx = (startStemTable[yearStemIdx] + monthIdx) % 10;

    return stems[monthStemIdx] + monthBranchNames[monthIdx];
}

// =====================================
// 年干支
// 1984年=甲子を基準
// =====================================

function getYearKanshi(year){
    const idx = ((year - 1984) % 60 + 60) % 60;
    return stems[idx % 10] + branches[idx % 12];
}

// =====================================
// 空亡
// BUG FIX: 空亡は日干支の十干indexから求める
// 旧コードは日支を引数にしたテーブルを使っていたが、
// 空亡は「日干の甲子算出時のindex」＝日干支番号 % 12 で
// 余った支（戌亥・申酉…）が空亡になる
// =====================================

function getVoid(dayStemIndex, dayBranchIndex){

    // 日干支の通し番号（甲子=0, 乙丑=1, ... 癸亥=59）から
    // 六十干支の組番を求め、空亡を特定する
    // 組番 = floor(通し番号 / 10)  ← 各組は干10個
    // 空亡は各組の11・12番目（index 10,11）の支
    // 組0(甲子〜癸酉)→戌亥, 組1(甲戌〜癸未)→申酉,
    // 組2(甲申〜癸巳)→午未, 組3(甲午〜癸卯)→辰巳,
    // 組4(甲辰〜癸丑)→寅卯, 組5(甲寅〜癸亥)→子丑

    const voidPairs = [
        '戌亥', // 甲子旬
        '申酉', // 甲戌旬
        '午未', // 甲申旬
        '辰巳', // 甲午旬
        '寅卯', // 甲辰旬
        '子丑'  // 甲寅旬
    ];

    // 甲子を基準に六十干支の通し番号を求める
    // 甲=0, 子=0 が基準
    // 通し番号 = stem*6 + ... は複雑なので、
    // stem % 10 と branch % 12 から最小公倍数60で算出
    // 簡便法: 通し番号 n は stem == n%10 かつ branch == n%12 を満たす最小の n
    let n = 0;
    for(let k = 0; k < 60; k++){
        if(k % 10 === dayStemIndex && k % 12 === dayBranchIndex){
            n = k;
            break;
        }
    }

    const groupIndex = Math.floor(n / 10);
    return voidPairs[groupIndex];
}

const sixChong = {
    '子':'午','午':'子',
    '丑':'未','未':'丑',
    '寅':'申','申':'寅',
    '卯':'酉','酉':'卯',
    '辰':'戌','戌':'辰',
    '巳':'亥','亥':'巳'
};

const sixHe = {
    '子':'丑','丑':'子',
    '寅':'亥','亥':'寅',
    '卯':'戌','戌':'卯',
    '辰':'酉','酉':'辰',

// =====================================
// 六合卦・六冲卦・帰魂卦・遊魂卦の判定
// =====================================

// 六合卦：全爻が六合の関係（1-4, 2-5, 3-6爻が合）
function isRokugoHex(lines){
    const pairs = [[0,3],[1,4],[2,5]];
    return pairs.every(([a,b]) => {
        const ba = getBranchFromLine(lines[a]);
        const bb = getBranchFromLine(lines[b]);
        return sixHe[ba] === bb;
    });
}

// 六冲卦：全爻が六冲の関係（1-4, 2-5, 3-6爻が冲）
function isRokuchyuHex(lines){
    const pairs = [[0,3],[1,4],[2,5]];
    return pairs.every(([a,b]) => {
        const ba = getBranchFromLine(lines[a]);
        const bb = getBranchFromLine(lines[b]);
        return sixChong[ba] === bb;
    });
}

// 支を文字列から抽出（getBranchの別名、判定用）
function getBranchFromLine(lineText){
    for(const b of branches){
        if(lineText && lineText.includes(b)) return b;
    }
    return '';
}

// 帰魂卦・遊魂卦はpalaceMapのshiから判定
// 帰魂卦: shi===3（四爻）で宮内8番目
// 遊魂卦: shi===3（四爻）で宮内7番目
// → palaceMapに種別を追加するか、卦名リストで判定
const kikonHexSet = new Set([
    '火天大有','天火同人','澤雷随','雷澤帰妹',
    '風山蠱','山風蠱','地水師','水地比'
]);
const yukonHexSet = new Set([
    '火地晋','天水訟','澤風大過','雷山小過',
    '風澤中孚','山雷頤','地火明夷','水天需'
]);

function getHexType(hexName, lines){
    if(kikonHexSet.has(hexName)) return '帰魂卦';
    if(yukonHexSet.has(hexName)) return '遊魂卦';
    if(isRokugoHex(lines))  return '六合卦';
    if(isRokuchyuHex(lines)) return '六冲卦';
    return '';
}

// 支を文字列から抽出（例：'妻財子水' → '子'）
function getBranch(lineText){
    // 六親名（子孫・妻財・官鬼・兄弟・父母）を除いた部分から支を探す
    const stripped = lineText
        .replace('子孫','').replace('妻財','').replace('官鬼','')
        .replace('兄弟','').replace('父母','');
    for(const b of branches){
        if(stripped.includes(b)) return b;
    }
    return '';
}

// =====================================
// 進神・退神判定
// 動爻が変じて同五行でより強い支→進神、弱い支→退神
// =====================================

const branchOrder = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];

function getShinTai(mainLine, changedLine){
    if(!changedLine || !mainLine) return '';
    const origBranch    = getBranch(mainLine);
    const changedBranch = getBranch(changedLine);
    if(!origBranch || !changedBranch) return '';

    const origElem    = getBranchElement(origBranch);
    const changedElem = getBranchElement(changedBranch);

    // 同五行でなければ進神・退神なし（回頭生・回頭剋を表示）
    if(origElem !== changedElem){
        if(generate[changedElem] === origElem) return '回頭生';
        if(control[changedElem] === origElem)  return '回頭剋';
        return '';
    }

    // 同五行：支の順番で進神・退神を判定
    const origIdx    = branchOrder.indexOf(origBranch);
    const changedIdx = branchOrder.indexOf(changedBranch);
    if(changedIdx > origIdx) return '進神';
    if(changedIdx < origIdx) return '退神';
    return '';
}

// =====================================
// 用神再現：複数の用神候補から真の用神を選ぶ
// 優先順位：動爻 > 世応 > 月破日破 > 空亡 > 相冲相合
// =====================================

function selectYoushin(
    candidates,  // [{index, line}, ...]
    coinInputs,
    shi, ou,
    monthBranch, dayBranch,
    voidStr
){
    if(candidates.length === 0) return -1;
    if(candidates.length === 1) return candidates[0].index;

    function score(c){
        const branch = getBranch(c.line);
        const coinVal = Number(coinInputs[c.index].value);
        let s = 0;

        // 1. 動爻（最優先）
        if(isMoving(coinVal)) s += 100000;

        // 2. 世爻・応爻
        if(c.index === shi || c.index === ou) s += 10000;

        // 3. 月破・日破（月建/日辰と六冲）
        if(sixChong[monthBranch] === branch ||
           sixChong[dayBranch]   === branch) s += 1000;

        // 4. 空亡
        if(voidStr.includes(branch)) s += 100;

        // 5. 相冲・相合（月建/日辰と冲または合）
        if(sixChong[monthBranch] === branch ||
           sixHe[monthBranch]    === branch ||
           sixChong[dayBranch]   === branch ||
           sixHe[dayBranch]      === branch) s += 10;

        return s;
    }

    // スコアが最大の候補を選ぶ
    let best = candidates[0];
    let bestScore = score(candidates[0]);
    for(let i = 1; i < candidates.length; i++){
        const s = score(candidates[i]);
        if(s > bestScore){
            bestScore = s;
            best = candidates[i];
        }
    }
    return best.index;
}

// =====================================
// コイン→陽
// =====================================

function isYang(v){

    return v===1 || v===3;
}

// =====================================
// 変爻
// =====================================

function isMoving(v){

    return v===0 || v===3;
}

// =====================================
// 主卦bit
// =====================================

function buildMainBits(){

    const arr = [];

    document
    .querySelectorAll('.coin')
    .forEach(v=>{

        const n =
            Number(v.value);

        arr.push(
            isYang(n)
            ? 1
            : 0
        );
    });

    return arr;
}

// =====================================
// 変卦bit
// =====================================

function buildChangedBits(main){

    const arr = [];

    document
    .querySelectorAll('.coin')
    .forEach((v,i)=>{

        const n =
            Number(v.value);

        let line =
            main[i];

        if(isMoving(n)){

            line =
                line
                ? 0
                : 1;
        }

        arr.push(line);
    });

    return arr;
}

// =====================================
// 卦名
// =====================================

function buildHexName(lines){

    const lower =
        lines
        .slice(0,3)
        .reverse()
        .join('');

    const upper =
        lines
        .slice(3,6)
        .reverse()
        .join('');

    const lowerName =
        trigramMap[lower];

    const upperName =
        trigramMap[upper];

    const key =
        upperName + lowerName;

    return hexagramNames[key]
        || key;
}

// =====================================
// 八卦抽出
// =====================================

function getTrigrams(lines){

    const lower =
        lines
        .slice(0,3)
        .reverse()
        .join('');

    const upper =
        lines
        .slice(3,6)
        .reverse()
        .join('');

    return {

        lower:
            trigramMap[lower],

        upper:
            trigramMap[upper]
    };
}

// =====================================
// 五行抽出
// =====================================

function getFiveElement(text){

    if(text.includes('木')) return '木';
    if(text.includes('火')) return '火';
    if(text.includes('土')) return '土';
    if(text.includes('金')) return '金';
    if(text.includes('水')) return '水';

    return '';
}

// =====================================
// 六親判定
// =====================================

function calcRokushin(
    baseElement,
    targetElement
){

    if(targetElement===baseElement)
        return '兄弟';

    if(generate[baseElement]
        === targetElement)
        return '子孫';

    if(control[baseElement]
        === targetElement)
        return '妻財';

    if(control[targetElement]
        === baseElement)
        return '官鬼';

    if(generate[targetElement]
        === baseElement)
        return '父母';

    return '';
}

// =====================================
// 納甲＋六親
// BUG FIX: 各卦の爻データを初爻から順番に並べる
// 旧コードは lower[0]〜lower[2] を初爻〜三爻としていたが
// trigramNaikoが逆順だったため正しく修正済み（trigramNaiko側を修正）
// =====================================

function buildNaiko(
    lines,
    hexName
){

    const tri =
        getTrigrams(lines);

    const lower =
        trigramNaiko[tri.lower].inner;

    const upper =
        trigramNaiko[tri.upper].outer;

    // 宮の基準五行を取得
    const palace =
        palaceMap[hexName]
        ? palaceMap[hexName].palace
        : '';

    const baseElement =
        palaceElement[palace] || '木';

    // 初爻〜三爻：下卦inner、四爻〜上爻：上卦outer
    const raw = [
        lower[0], lower[1], lower[2],
        upper[0], upper[1], upper[2]
    ];

    return raw.map(v=>{

        const element =
            getFiveElement(v);

        const rokushin =
            calcRokushin(
                baseElement,
                element
            );

        return rokushin + v;
    });
}

// =====================================
// 世応
// =====================================

function getShi(hex){

    if(palaceMap[hex])
        return palaceMap[hex].shi;

    return 0;
}

function getOu(shi){

    return (shi + 3) % 6;
}

// =====================================
// 相生逆引
// =====================================

function generatedBy(element){

    for(const k in generate){

        if(generate[k]===element)
            return k;
    }

    return '';
}

// =====================================
// 相剋逆引
// =====================================

function controlledBy(element){

    for(const k in control){

        if(control[k]===element)
            return k;
    }

    return '';
}

// =====================================
// 仇神
// =====================================

function getKyushin(y){

    const kishin =
        controlledBy(y);

    return generatedBy(kishin);
}

// =====================================
// 用神系判定
// =====================================

function calcShin(
    text,
    y
){

    const t =
        getFiveElement(text);

    if(t===y)
        return '用神';

    if(generate[t]===y)
        return '原神';

    if(control[t]===y)
        return '忌神';

    if(t===getKyushin(y))
        return '仇神';

    return '';
}

// =====================================
// コイン記号
// BUG FIX: 六爻占術の標準的な記号に修正
// 旧コード: 0→✕ 1→′ 2→″ 3→〇
// 正しくは: 1→少陽(—) 2→少陰(--) 3→老陽(〇) 0→老陰(×)
// =====================================

function coinMark(v){

    if(v===1) return '‵';   // 少陽：不動の陽爻
    if(v===2) return '‶';   // 少陰：不動の陰爻
    if(v===3) return '〇';  // 老陽：動爻（陽→陰に変化）
    if(v===0) return '✕';   // 老陰：動爻（陰→陽に変化）

    return '';
}

// =====================================
// 伏神
// 用神の五行が主卦中にない場合、同宮の純卦の各爻から探す
// 純卦の爻のうち用神五行と一致するものが伏神
// =====================================

// 各宮の純卦名
const palacePureHex = {
    '乾宮':'乾為天',
    '兌宮':'兌為澤',
    '離宮':'離為火',
    '震宮':'震為雷',
    '巽宮':'巽為風',
    '坎宮':'坎為水',
    '艮宮':'艮為山',
    '坤宮':'坤為地'
};

// 純卦のbits（初爻〜上爻、1=陽 0=陰）
const pureHexBits = {
    '乾為天':[1,1,1,1,1,1],
    '兌為澤':[1,1,0,1,1,0],
    '離為火':[1,0,1,1,0,1],
    '震為雷':[1,0,0,1,0,0],
    '巽為風':[0,1,1,0,1,1],
    '坎為水':[0,1,0,0,1,0],
    '艮為山':[0,0,1,0,0,1],
    '坤為地':[0,0,0,0,0,0]
};

function buildFukushin(
    mainLines,
    yElement,
    mainHex
){
    const result = ['','','','','',''];
    const roles  = ['','','','','',''];

    // 同宮の純卦を取得
    const palace =
        palaceMap[mainHex]
        ? palaceMap[mainHex].palace
        : '';

    const pureHexName = palacePureHex[palace] || '';
    if(!pureHexName) return { lines: result, roles, pureHexName: '' };

    const pureBits = pureHexBits[pureHexName];
    const pureLines = buildNaiko(pureBits, pureHexName);

    // 主卦中に存在する五行セット
    const mainElements = new Set(
        mainLines.map(v => getFiveElement(v))
    );

    // 表示対象の役割と五行（用神・原神・忌神・仇神）
    const targetRoles = [
        { role: '用神', elem: yElement },
        { role: '原神', elem: generatedBy(yElement) },
        { role: '忌神', elem: controlledBy(yElement) },
        { role: '仇神', elem: getKyushin(yElement) }
    ];

    // 主卦中にない五行のみ伏神候補
    const hiddenTargets = targetRoles.filter(
        t => t.elem && !mainElements.has(t.elem)
    );

    if(hiddenTargets.length === 0)
        return { lines: result, roles, pureHexName: '' };

    // 純卦の各爻を調べて伏神を割り当て
    // 優先順位：用神 > 原神 > 忌神 > 仇神
    for(let i = 0; i < 6; i++){

        const mainElem = getFiveElement(mainLines[i]);
        const pureElem = getFiveElement(pureLines[i]);

        // 主卦と純卦で支が違う爻にのみ伏神が潜む
        if(mainElem === pureElem) continue;

        const matched = hiddenTargets.find(
            t => t.elem === pureElem
        );

        if(matched){
            result[i] = pureLines[i];
            roles[i]  = matched.role;
        }
    }

    // 1つも伏神がなければ純卦名も不要
    const hasFuku = result.some(v => v !== '');
    return {
        lines: result,
        roles,
        pureHexName: hasFuku ? pureHexName : ''
    };
}

// =====================================
// 六獣配置
// BUG FIX: 六獣は日干により開始位置が変わる
// 旧コードは beasts[i] で固定割り当て（常に青龍が初爻）だった
// 正しくは日干ごとに初爻の六獣が決まる（六獣遁法）:
// 甲戊庚→青龍から、乙己→朱雀から、丙丁→勾陳から、
// 壬癸→玄武から、辛→白虎から
// =====================================

function getBeastsForDay(dayStemIndex){

    // 六獣開始index（初爻に付く六獣）
    // 甲(0)戊(4)庚(6)→青龍(0)
    // 乙(1)己(5)→朱雀(1)
    // 丙(2)丁(3)→勾陳(2)
    // 辛(7)→白虎(4)
    // 壬(8)癸(9)→玄武(5)
    const startTable = [
        0, // 甲→青龍
        0, // 乙→青龍
        1, // 丙→朱雀
        1, // 丁→朱雀
        2, // 戊→勾陳
        3, // 己→騰蛇
        4, // 庚→白虎
        4, // 辛→白虎
        5, // 壬→玄武
        5  // 癸→玄武
    ];

    const start = startTable[dayStemIndex];
    const result = [];

    for(let i=0;i<6;i++){
        result.push(
            beasts[(start + i) % 6]
        );
    }

    return result;
}

function resetCoinInput(){
    const el = document.getElementById('coinInput');
    el.value = '';
    el.focus();
}

function buildHexagramFromInput(){
    const raw = (document.getElementById('coinInput').value || '').trim();
    if(raw.length !== 6){
        alert('コインを6桁（初爻〜上爻）で入力してください。\n例：111223');
        return;
    }
    for(let i = 0; i < 6; i++){
        document.getElementById(`coin${i}`).value = raw[i];
    }

    // ポイントログ収集：console.logを横取り
    const logs = [];
    const _origLog = console.log;
    console.log = (...args) => {
        _origLog(...args);
        logs.push(args.join(' '));
    };

    buildHexagram();

    console.log = _origLog;

    // ポイントログ表示（用神・原神・忌神・合計・大過行のみ）
    const keywords = ['[用神]','[原神]','[忌神]','[合計]','[大過','[暗動]','[連続相生]'];
    const filtered = logs.filter(l => keywords.some(k => l.startsWith(k)));
    const logEl = document.getElementById('pointLog');
    if(filtered.length > 0){
        logEl.textContent = filtered.join('\n');
        logEl.style.display = 'block';
    } else {
        logEl.style.display = 'none';
    }

    // コイン文字列を_lastResultに追加
    if(window._lastResult) window._lastResult.coins = raw;
}

function buildHexagram(){

    // ムーンボイードチェック
    updateVoidBanner();
    const voidInfo = getMoonVoidState(new Date());
    if(voidInfo && voidInfo.state !== 'ok'){
        document.getElementById('result').innerHTML = '';
        return; // ボイド中・前後2時間は占わない
    }

    // 占断日時（ボタンを押した瞬間）
    const dt = new Date();

    // 日時文字列を最下行に表示
    const pad = n => String(n).padStart(2,'0');
    const dtStr =
        dt.getFullYear() + '年' +
        pad(dt.getMonth()+1) + '月' +
        pad(dt.getDate()) + '日　' +
        pad(dt.getHours()) + ':' +
        pad(dt.getMinutes());
    document.getElementById('datetimeDisplay').textContent = dtStr;

    const day =
        getKanshi(dt);

    const dayStemIndex =
        stems.indexOf(
            day.charAt(0)
        );

    const dayBranch =
        day.charAt(1);

    const dayBranchIndex =
        branches.indexOf(dayBranch);

    const month =
        getMonthKanshi(dt);

    // 支の五行
    const branchElement = {
        '子':'水','丑':'土','寅':'木','卯':'木',
        '辰':'土','巳':'火','午':'火','未':'土',
        '申':'金','酉':'金','戌':'土','亥':'水'
    };

    const monthBranch = month.charAt(1);
    const monthElem = branchElement[monthBranch] || '';
    const dayElem   = branchElement[dayBranch]   || '';
    const voidStr   = getVoid(dayStemIndex, dayBranchIndex);

    document
    .getElementById('dateInfo')
    .innerHTML =
        `占い日：　${month}(${monthElem})月　　${day}(${dayElem})日　　　空亡－${voidStr}`;

    // 卦生成

    const mainBits =
        buildMainBits();

    const changedBits =
        buildChangedBits(
            mainBits
        );

    const mainHex =
        buildHexName(
            mainBits
        );

    const changedHex =
        buildHexName(
            changedBits
        );

    // 世応

    const shi =
        getShi(mainHex);

    const ou =
        getOu(shi);

    // 六親生成（宮の基準五行を使うのでhexNameを渡す）

    const mainLines =
        buildNaiko(
            mainBits,
            mainHex
        );

    const changedLines =
        buildNaiko(
            changedBits,
            mainHex  // 変卦も主卦の宮基準で六親を算出
        );

    // 用神（宮の基準五行）

    const palace =
        palaceMap[mainHex]
        ? palaceMap[mainHex].palace
        : '';

    const baseElement =
        palaceElement[palace] || '木';

    const select =
        document
        .getElementById(
            'youshin'
        ).value;

    // 宮の基準五行から六親→五行マップを生成
    const roleMap =
        getRoleElementMap(baseElement);

    let yElement = '';

    if(select==='世爻'){
        // 世爻の五行はmainLines[shi]から直接取得する
        yElement = getFiveElement(mainLines[shi]);
    }
    else{
        yElement = roleMap[select] || '';
    }

    // =========================================
    // 用神再現：主卦中に用神五行が2つ以上ある場合
    // selectYoushin()で真の用神爻を決定する
    // 世爻を用神に選んだ場合は再現をスキップし世爻を直接用神とする
    // =========================================

    const coinInputsArr =
        Array.from(document.querySelectorAll('.coin'));

    const youshinCandidates = [];
    for(let i = 0; i < 6; i++){
        if(getFiveElement(mainLines[i]) === yElement){
            youshinCandidates.push({ index: i, line: mainLines[i] });
        }
    }

    let youshinIndex;

    if(select === '世爻'){
        youshinIndex = shi;
    } else {
        youshinIndex = selectYoushin(
            youshinCandidates,
            coinInputsArr,
            shi, ou,
            monthBranch, dayBranch,
            voidStr
        );
    }

    // 伏神

    const fukushin =
        buildFukushin(
            mainLines,
            yElement,
            mainHex
        );

    const fukushinLines    = fukushin.lines;
    const fukushinRoles    = fukushin.roles;
    const fukushinHexName  = fukushin.pureHexName;

    // 六獣（日干に基づいて配置）

    const dayBeasts =
        getBeastsForDay(
            dayStemIndex
        );

    // 描画

    let html =
        '<table class="result-table">';

    const coinInputs =
        document
        .querySelectorAll('.coin');

    // 長生の地マップ
    const chouseiMap = { '木':'亥', '火':'寅', '土':'申', '金':'巳', '水':'申' };

    // 動爻の五行セット（暗動判定用）
    const movingElements = new Set();
    for(let i = 0; i < 6; i++){
        if(isMoving(Number(coinInputs[i].value))){
            const el = getFiveElement(mainLines[i]);
            if(el) movingElements.add(el);
        }
    }

    // 暗動インデックスを事前計算
    const andouIndices = new Set();
    for(let i = 0; i < 6; i++){
        if(isMoving(Number(coinInputs[i].value))) continue;
        const lineElem   = getFiveElement(mainLines[i]);
        const lineBranch = getBranch(mainLines[i]);
        if(!lineElem || !lineBranch) continue;

        // 日辰に冲されているか（必須条件）
        if(sixChong[dayBranch] !== lineBranch) continue;

        // 月建からの4条件のいずれか
        const monthElem = getBranchElement(monthBranch);
        let monthCond = false;
        if(monthElem === lineElem) monthCond = true;
        if(generate[monthElem] === lineElem) monthCond = true;
        let genByMoving = false;
        for(const mEl of movingElements){ if(generate[mEl] === lineElem){ genByMoving = true; break; } }
        if(genByMoving) monthCond = true;
        if(monthBranch === chouseiMap[lineElem]) monthCond = true;

        if(monthCond) andouIndices.add(i);
    }

    for(let i=5;i>=0;i--){

        const role =
            (getFiveElement(mainLines[i]) === yElement &&
             youshinCandidates.length >= 2 &&
             i !== youshinIndex)
            ? ''
            : calcShin(mainLines[i], yElement);

        const se =

            i===shi
            ? '世'
            : (
                i===ou
                ? '応'
                : ''
            );

        // 伏神の純卦名：この爻に伏神があれば表示
        const fukuHexDisplay =
            fukushinLines[i]
            ? `<ruby>${fukushinHexName}<rt>${hexagramReading[fukushinHexName]||''}</rt></ruby>`
            : '';

        // 飛神（変卦）の卦名：この爻が変爻なら表示
        const coinVal = Number(coinInputs[i].value);
        const isMove  = isMoving(coinVal);
        const changedLineDisplay = isMove ? changedLines[i] : '';

        // 空亡の支だけグレーにするフォーマット関数
        function fmtVoid(lineText){
            if(!lineText) return lineText;
            const br = getBranch(lineText);
            if(!br || !voidStr.includes(br)) return lineText;
            return lineText.replace(br, `<span style="color:#666;">${br}</span>`);
        }

        // 暗動判定：事前計算済みのandouIndicesを使用
        const lineElem = getFiveElement(mainLines[i]);
        const isAndou  = andouIndices.has(i);

        // 暗動コンソールログ
        if(isAndou){
            const kouName = ['初爻','二爻','三爻','四爻','五爻','上爻'][i];
            console.log(`[暗動] ${kouName}：${mainLines[i]}　（日辰${dayBranch}に冲される）`);
        }

        const mainBranch   = getBranch(mainLines[i]);
        const changedBranchDisp = getBranch(changedLineDisplay);

        html += `

        <tr>

        <td class="andou-col"></td>

        <td class="role-col">

            ${fukushinRoles[i]}

        </td>

        <td class="fuku-col">

            ${fmtVoid(fukushinLines[i])}

        </td>

        <td class="main-role-col">

            ${role}

        </td>

        <td class="andou-inline-col">${isAndou ? '暗動' : ''}</td>

        <td class="main-col">

            ${fmtVoid(mainLines[i])}

        </td>

        <td class="coin-col">

            ${coinMark(coinVal)}

        </td>

        <td class="se-col">

            ${se}

        </td>

        <td class="shintai-col">

            ${isMove ? getShinTai(mainLines[i], changedLines[i]) : ''}

        </td>

        <td class="change-col">

            ${fmtVoid(changedLineDisplay)}

        </td>

        <td class="beast-col">

            ${dayBeasts[i]}

        </td>

        </tr>
        `;
    }

    const hasMovingLine = Array.from(coinInputs).some(c => isMoving(Number(c.value)));

    // 六合・六冲・帰魂・遊魂の判定
    const mainHexType    = getHexType(mainHex, mainLines);
    const changedHexType = hasMovingLine ? getHexType(changedHex, changedLines) : '';
    const fukuHexType    = fukushinHexName ? getHexType(fukushinHexName,
        Array.from({length:6}, (_,i) => fukushinLines[i] || mainLines[i])) : '';

    html += `

    <tr class="hex-row">

    <td class="andou-col"></td>

    <td class="role-col">${palace}</td>

    <td class="fuku-col">
    ${fukushinHexName
        ? `<ruby>${fukushinHexName}<rt>${hexagramReading[fukushinHexName]||''}</rt></ruby>
           ${fukuHexType ? `<div class="hex-type">${fukuHexType}</div>` : ''}`
        : ''}
    </td>

    <td class="main-role-col"></td>

    <td class="andou-inline-col"></td>

    <td class="hex-center">
    <ruby>${mainHex}<rt>${hexagramReading[mainHex]||''}</rt></ruby>
    ${mainHexType ? `<div class="hex-type">${mainHexType}</div>` : ''}
    </td>

    <td class="coin-col"></td>
    <td class="se-col"></td>
    <td class="shintai-col"></td>

    <td class="change-col">
    ${hasMovingLine
        ? `<ruby>${changedHex}<rt>${hexagramReading[changedHex]||''}</rt></ruby>
           ${changedHexType ? `<div class="hex-type">${changedHexType}</div>` : ''}`
        : ''}
    </td>

    <td class="beast-col"></td>

    </tr>
    `;

    html += '</table>';

    // ポイント計算







    const { score: point, isTaika } = calcPoint(
        mainLines,
        changedLines,
        coinInputsArr,
        youshinIndex,
        yElement,
        shi,
        monthBranch,
        dayBranch,
        voidStr,
        fukushinLines,
        fukushinRoles,
        andouIndices,
        select
    );

    const displayPoint = isTaika ? -point : point;
    const pointSign    = displayPoint > 0 ? '＋' : '';
    const pointColor   = displayPoint >= 4 ? '#2255cc' : displayPoint <= -4 ? '#cc2222' : '#000000';
    const taikaLabel   = isTaika ? `<span style="font-size:28px; color:${pointColor}; margin-left:16px;">大過</span>` : '';

    // 判定（リスト用、UI表示なし）
    const hantei = displayPoint >= 4 ? '吉' : displayPoint <= -4 ? '凶' : '中';

    html += `
    <div class="point-box">
        <div class="point-label">運の強さ</div>
        <div class="point-value" style="color:${pointColor}">${pointSign}${displayPoint}${taikaLabel}</div>
    </div>
    <div style="text-align:center; margin-top:16px;">
        <button onclick="addToList()" style="font-size:18px; padding:8px 28px; cursor:pointer;">リストに追加</button>
    </div>
    <div id="pointLog" style="font-size:16px; color:#555; font-family:monospace; background:#f5f3ee; border:1px solid #ddd; border-radius:6px; padding:12px 16px; margin-top:20px; white-space:pre-wrap; display:none;"></div>
    `;

    document.getElementById('result').innerHTML = html;

    // 最新結果をグローバルに保持
    const now = new Date();
    window._lastResult = {
        toi:      (document.getElementById('といInput').value || '').trim(),
        month:    monthBranch,
        day:      day,
        youshin:  select,
        mainHex:  mainHex,
        changedHex: hasMovingLine ? changedHex : '—',
        score:    displayPoint,
        hantei:   hantei,
        date:     `${now.getFullYear()}/${pad(now.getMonth()+1)}/${pad(now.getDate())}`
    };
}

// =====================================
// ポイント計算
// ポイント = 用神スコア + 原神スコア - 忌神スコア
// 原神・忌神は独発の場合のみ有効
// =====================================

// 支→五行マップ
const branchElementMap = {
    '子':'水','丑':'土','寅':'木','卯':'木',
    '辰':'土','巳':'火','午':'火','未':'土',
    '申':'金','酉':'金','戌':'土','亥':'水'
};

function getBranchElement(branch){
    return branchElementMap[branch] || null;
}

// 参照支（月建・日辰）と対象五行の関係スコアを返す
function calcElementRelation(targetElem, refBranch){
    const refElem = getBranchElement(refBranch);
    if(!refElem || !targetElem) return 0;
    if(refElem === targetElem)             return 3;  // 同行
    if(generate[refElem] === targetElem)   return 2;  // 生じる
    if(control[refElem] === targetElem)    return -2; // 剋される
    return 0; // 洩らす・剋す
}

function calcPoint(
    mainLines,
    changedLines,
    coinInputsArr,
    youshinIndex,
    yElement,
    shi,
    monthBranch,
    dayBranch,
    voidStr,
    fukushinLines,
    fukushinRoles,
    andouIndices,
    select
){
    function isMovingIdx(i){ return isMoving(Number(coinInputsArr[i].value)) || andouIndices.has(i); }

    // 動爻インデックス一覧
    const movingIndices = [];
    for(let i = 0; i < 6; i++){
        if(isMovingIdx(i)) movingIndices.push(i);
    }
    const isDokuhatsu = movingIndices.length === 1;

    // 回頭生・回頭剋スコア（スコア値とラベルを返す）
    function getKaitouScore(idx){
        if(!isMovingIdx(idx)) return { score: 0, label: '' };
        const mainElem      = getBranchElement(getBranch(mainLines[idx]));
        const changedBranch = getBranch(changedLines[idx]);
        if(!changedBranch || !mainElem) return { score: 0, label: '' };
        const changedElem = getBranchElement(changedBranch);
        if(generate[changedElem] === mainElem) return { score:  2, label: '回頭生' };
        if(control[changedElem]  === mainElem) return { score: -2, label: '回頭剋' };
        return { score: 0, label: '' };
    }

    // 進神・退神スコア
    function getShinTaiScore(idx){
        if(!isMovingIdx(idx)) return 0;
        const result = getShinTai(mainLines[idx], changedLines[idx]);
        if(result === '進神') return 1;
        if(result === '退神') return -1;
        return 0;
    }

    // 用神スコア
    function calcYoushinScore(){
        // 用神が主卦中に存在しない（伏神）場合
        if(youshinIndex === -1){
            const fukuIdx = fukushinRoles.findIndex(r => r === '用神');
            if(fukuIdx === -1) return 0;
            const yBranch = getBranch(fukushinLines[fukuIdx]);
            if(!yBranch) return 0;
            const yElem   = getBranchElement(yBranch);
            const mScore  = calcElementRelation(yElem, monthBranch);
            const dScore  = calcElementRelation(yElem, dayBranch);
            const flyLine   = mainLines[fukuIdx];
            const flyBranch = getBranch(flyLine);
            const flyElem   = getBranchElement(flyBranch);
            let flyScore = 0;
            if(control[yElem]    === flyElem) flyScore += 1;
            if(generate[flyElem] === yElem)   flyScore += 1;
            if(control[flyElem]  === yElem)   flyScore -= 1;
            if(generate[yElem]   === flyElem) flyScore -= 1;
            const total = mScore + dScore + flyScore;
            console.log(`[用神伏神] 爻位:${fukuIdx+1}爻 伏神:${fukushinLines[fukuIdx]}(${yElem}) 飛神:${flyLine}(${flyElem})`);
            console.log(`  月建:${mScore} 日辰:${dScore} 飛神:${flyScore} 合計:${total}`);
            return total;
        }

        let score = 0;
        const yBranch = getBranch(mainLines[youshinIndex]);
        const yElem   = getBranchElement(yBranch);

        const mScore  = calcElementRelation(yElem, monthBranch);
        const dScore  = calcElementRelation(yElem, dayBranch);
        const kResult = getKaitouScore(youshinIndex);
        const kScore  = kResult.score;
        const kLabel  = kResult.label;

        const shiScore  = (youshinIndex === shi && select !== '世爻') ? 1 : 0;
        const moveScore = isMovingIdx(youshinIndex) ? 1 : 0;
        const voidScore = voidStr.includes(yBranch) ? -1 : 0;

        // 日冲ペナルティ：日冲適用前のスコアがマイナスの時のみ-1
        const preChongScore = mScore + dScore + shiScore + moveScore + voidScore + kScore;
        const chongScore = (sixChong[dayBranch] === yBranch && preChongScore < 0) ? -1 : 0;

        score += mScore;
        score += dScore;
        score += shiScore;
        score += moveScore;
        score += voidScore;
        score += chongScore;
        score += kScore;

        console.log(`[用神] ${mainLines[youshinIndex]}(${yElem}) 月:${mScore} 日:${dScore} 世爻:${shiScore} 動爻/暗動:${moveScore} 空亡:${voidScore} 日冲:${chongScore} ${kLabel||'回頭'}:${kScore} 合計:${score}`);
        return score;
    }

    // 原神・忌神スコア（内訳ログ付き）
    // 独発：正負そのまま用神に影響
    // 独発以外で動爻あり：スコアが0以下なら0扱い
    function calcShinScore(targetElem, label){
        if(!targetElem) return 0;

        if(isDokuhatsu){
            const matchIdx = movingIndices[0];
            const elem = getBranchElement(getBranch(mainLines[matchIdx]));
            if(elem !== targetElem){
                console.log(`[${label}] 五行:${targetElem} → 独発爻が対象外 スコア:0`);
                return 0;
            }
            const mScore  = calcElementRelation(targetElem, monthBranch);
            const dScore  = calcElementRelation(targetElem, dayBranch);
            const kResult = getKaitouScore(matchIdx);
            const kScore  = kResult.score;
            const kLabel  = kResult.label;
            const stScore = getShinTaiScore(matchIdx);
            const bonus   = 1;
            const score   = mScore + dScore + kScore + stScore + bonus;
            console.log(`[${label}] 五行:${targetElem} 月:${mScore} 日:${dScore} ${kLabel||'回頭'}:${kScore} 進退:${stScore} 独発:+${bonus} 合計:${score}`);
            return score;

        } else {
            const matchIdx = movingIndices.find(i =>
                getBranchElement(getBranch(mainLines[i])) === targetElem
            );
            if(matchIdx === undefined){
                console.log(`[${label}] 五行:${targetElem} → 動爻なし スコア:0`);
                return 0;
            }
            const mScore  = calcElementRelation(targetElem, monthBranch);
            const dScore  = calcElementRelation(targetElem, dayBranch);
            const kResult = getKaitouScore(matchIdx);
            const kScore  = kResult.score;
            const kLabel  = kResult.label;
            const stScore = getShinTaiScore(matchIdx);
            const raw     = mScore + dScore + kScore + stScore;
            const score   = Math.max(raw, 0);
            console.log(`[${label}] 五行:${targetElem} 月:${mScore} 日:${dScore} ${kLabel||'回頭'}:${kScore} 進退:${stScore} 合計:${raw}${raw < 0 ? ' → 0(下限)' : ''}`);
            return score;
        }
    }

    // 原神の五行（用神を生じる五行）
    const genElem = generatedBy(yElement);

    // 忌神の五行（用神を剋す五行）
    const ikiElem = Object.keys(control).find(k => control[k] === yElement) || null;

    const yScore   = calcYoushinScore();
    const genScore = calcShinScore(genElem, '原神');
    const ikiScore = calcShinScore(ikiElem, '忌神');

    // 発動判定（動爻 or 暗動）
    function isActive(targetElem){
        if(!targetElem) return false;
        for(let i = 0; i < 6; i++){
            const elem = getBranchElement(getBranch(mainLines[i]));
            if(elem === targetElem && isMovingIdx(i)) return true;
        }
        return false;
    }

    // 連続相生判定：原神が発動 かつ 忌神が発動 → 忌神スコア無効化
    const isRensoku = isActive(genElem) && isActive(ikiElem);

    const effectiveGenScore = isRensoku ? Math.max(genScore, 0) : genScore;
    const effectiveIkiScore = isRensoku ? 0 : ikiScore;

    const total = yScore + effectiveGenScore - effectiveIkiScore;

    if(isRensoku){
        console.log(`[連続相生] 原神:${genElem}(発動) 忌神:${ikiElem}(発動) → 忌神スコア無効化`);
    }
    console.log(`[合計] 用神:${yScore} + 原神:${effectiveGenScore} - 忌神:${effectiveIkiScore} = ${total}`);

    // 大過判定①：用神への生 >= 3、剋なし、合計 >= +8（良すぎ→凶）
    let genCount = 0;
    let hasKoku  = false;

    if(calcElementRelation(yElement, monthBranch) > 0) genCount++;
    if(calcElementRelation(yElement, dayBranch)   > 0) genCount++;

    for(let i = 0; i < 6; i++){
        if(!isMovingIdx(i)) continue;
        const br = getBranch(mainLines[i]);
        if(!br) continue;
        const el = getBranchElement(br);
        if(generate[el] === yElement) genCount++;
        if(control[el]  === yElement) hasKoku = true;
    }
    if(effectiveGenScore > 0) genCount++;

    const isTaikaPos = (genCount >= 3 && !hasKoku && total >= 8);

    // 大過判定②：用神への剋 >= 3、生なし、合計 <= -8（悪すぎ→吉）
    let kokuCount = 0;
    let hasGen    = false;

    if(calcElementRelation(yElement, monthBranch) < 0) kokuCount++;
    if(calcElementRelation(yElement, dayBranch)   < 0) kokuCount++;

    for(let i = 0; i < 6; i++){
        if(!isMovingIdx(i)) continue;
        const br = getBranch(mainLines[i]);
        if(!br) continue;
        const el = getBranchElement(br);
        if(control[el]  === yElement) kokuCount++;
        if(generate[el] === yElement) hasGen = true;
    }
    if(effectiveIkiScore > 0) kokuCount++;

    const isTaikaNeg = (kokuCount >= 3 && !hasGen && total <= -8);

    const isTaika = isTaikaPos || isTaikaNeg;
    console.log(`[大過①良→凶] 生カウント:${genCount} 剋あり:${hasKoku} → ${isTaikaPos ? '大過' : '-'}`);
    console.log(`[大過②悪→吉] 剋カウント:${kokuCount} 生あり:${hasGen} → ${isTaikaNeg ? '大過' : '-'}`);

    return { score: total, isTaika };
}

// =====================================
// 結果リスト管理（A+B+C）
// =====================================

const LIST_KEY = 'rokkou_result_list';

function loadList(){
    try {
        return JSON.parse(localStorage.getItem(LIST_KEY) || '[]');
    } catch(e){ return []; }
}

function saveList(list){
    localStorage.setItem(LIST_KEY, JSON.stringify(list));
}

function addToList(){
    const r = window._lastResult;
    if(!r){ alert('先に「占う」ボタンを押してください。'); return; }
    const list = loadList();
    list.push({ ...r, id: Date.now() });
    saveList(list);
    renderList();
}

function deleteFromList(id){
    const list = loadList().filter(r => r.id !== id);
    saveList(list);
    renderList();
}

function clearList(){
    if(!confirm('リストをすべて消去しますか？')) return;
    saveList([]);
    renderList();
}

function exportCSV(){
    const list = loadList();
    if(list.length === 0){ alert('リストが空です。'); return; }
    const header = ['#','問い','月','日干支','用神','主卦','変卦','スコア','判定','占断日','コイン'];
    const rows = list.map((r, i) => [
        i+1,
        `"${(r.toi||'').replace(/"/g,'""')}"`,
        r.month, r.day, r.youshin, r.mainHex, r.changedHex,
        (r.score > 0 ? '+' : '') + r.score,
        r.hantei,
        r.date || '',
        r.coins || ''
    ]);
    const csv = '\uFEFF' + [header, ...rows].map(r => r.join(',')).join('\n');
    const uri = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
    const a = document.createElement('a');
    a.href = uri;
    a.download = `六爻占術_結果リスト_${new Date().toLocaleDateString('ja-JP').replace(/\//g,'-')}.csv`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
}

function renderList(){
    const list = loadList();
    const el = document.getElementById('resultList');
    const countEl = document.getElementById('listCount');
    countEl.textContent = list.length > 0 ? `（${list.length}件）` : '';

    if(list.length === 0){
        el.innerHTML = '<p style="color:#888; font-size:18px;">まだ結果がありません。「リストに追加」ボタンで追加できます。</p>';
        return;
    }

    let html = `<table style="border-collapse:collapse; font-size:18px; width:100%;">
    <thead>
      <tr style="border-bottom:2px solid #ccc; color:#555;">
        <th style="padding:8px 10px; text-align:left;">#</th>
        <th style="padding:8px 10px; text-align:left;">問い</th>
        <th style="padding:8px 10px;">月</th>
        <th style="padding:8px 10px;">日干支</th>
        <th style="padding:8px 10px;">用神</th>
        <th style="padding:8px 10px;">主卦</th>
        <th style="padding:8px 10px;">変卦</th>
        <th style="padding:8px 10px; text-align:right;">スコア</th>
        <th style="padding:8px 10px;">判定</th>
        <th style="padding:8px 10px;">占断日</th>
        <th style="padding:8px 10px; font-family:monospace;">コイン</th>
        <th style="padding:8px 4px;"></th>
      </tr>
    </thead><tbody>`;

    list.forEach((r, i) => {
        const sc = r.score;
        const scoreStr = (sc > 0 ? '＋' : '') + sc;
        const scoreColor = sc >= 4 ? '#2255cc' : sc <= -4 ? '#cc2222' : '#333';
        const hColor = r.hantei === '吉' ? '#2255cc' : r.hantei === '凶' ? '#cc2222' : '#555';
        html += `<tr style="border-bottom:1px solid #e0ddd5;">
          <td style="padding:8px 10px; color:#aaa;">${i+1}</td>
          <td style="padding:8px 10px;">${r.toi || ''}</td>
          <td style="padding:8px 10px; text-align:center;">${r.month}</td>
          <td style="padding:8px 10px; text-align:center;">${r.day}</td>
          <td style="padding:8px 10px; text-align:center;">${r.youshin}</td>
          <td style="padding:8px 10px; text-align:center;">${r.mainHex}</td>
          <td style="padding:8px 10px; text-align:center;">${r.changedHex}</td>
          <td style="padding:8px 10px; text-align:right; color:${scoreColor}; font-weight:bold;">${scoreStr}</td>
          <td style="padding:8px 10px; text-align:center; color:${hColor}; font-weight:bold;">${r.hantei}</td>
          <td style="padding:8px 10px; text-align:center; color:#888; font-size:15px;">${r.date || ''}</td>
          <td style="padding:8px 10px; text-align:center; font-family:monospace; letter-spacing:3px;">${r.coins || ''}</td>
          <td style="padding:8px 4px; text-align:center;">
            <button onclick="deleteFromList(${r.id})" style="font-size:14px; padding:2px 8px; cursor:pointer; color:#888;">✕</button>
          </td>
        </tr>`;
    });

    html += '</tbody></table>';
    el.innerHTML = html;
}

// 初期化
renderList();

buildHexagram();
